# Automated dependency + security updates.
# Dependabot opens PRs when a dependency has an update or a known vulnerability.
version: 2
updates:
  # Android client (Gradle)
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"

  # Windows host (.NET / NuGet)
  - package-ecosystem: "nuget"
    directory: "/windows/SticamHost"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
