# Automated dependency + security updates.
#
# SECURITY updates are not configured here. They are enabled in the repo's
# Settings > Advanced Security and keep working with or without this file,
# opening a PR only when a dependency has a known vulnerability. That is the
# half worth having: STICam bundles FFmpeg, which parses untrusted video off
# the network, so a real CVE there needs to surface fast.
#
# VERSION updates -- the routine "a newer release exists" PRs -- are DISABLED
# via `open-pull-requests-limit: 0`, which per GitHub's docs affects version
# updates only and leaves security updates untouched. Two full batches were
# closed unmerged without ever being wanted (10 PRs on 2026-07-18, 7 more on
# 2026-07-22), so the weekly churn was only cluttering the branch list.
#
# To resume them, set the limits back to 5. The `ignore` blocks are kept for
# exactly that case: if resumed, breaking MAJOR bumps stay filtered out and
# only minor/patch updates come through.
version: 2
updates:
  # Android client (Gradle)
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Windows host (.NET / NuGet)
  - package-ecosystem: "nuget"
    directory: "/windows/SticamHost"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "ci"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
