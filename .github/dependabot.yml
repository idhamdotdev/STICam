# Automated dependency + security updates.
# Dependabot opens PRs when a dependency has an update or a known vulnerability.
# Breaking MAJOR version bumps are ignored to avoid noisy, build-breaking PRs.
# Minor, patch, and security updates still come through. To take a specific
# major anyway, comment `@dependabot ignore` settings on the PR or remove the
# relevant `ignore` block below.
version: 2
updates:
  # Android client (Gradle)
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Windows host (.NET / NuGet)
  - package-ecosystem: "nuget"
    directory: "/windows/SticamHost"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
