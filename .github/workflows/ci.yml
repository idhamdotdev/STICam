name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1
        with:
          cache-provider: basic

      - name: Run unit-test task and build debug APK
        working-directory: android
        run: .\gradlew.bat --no-daemon testDebugUnitTest assembleDebug

  windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up .NET 8
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Restore
        run: |
          dotnet restore windows/SticamHost/SticamHost.csproj --configfile NuGet.Config --locked-mode
          dotnet restore windows/SticamHost.Tests/SticamHost.Tests.csproj --configfile NuGet.Config --locked-mode

      - name: Build Release
        run: dotnet build windows/SticamHost/SticamHost.csproj --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Run Windows protocol and parser tests
        run: dotnet run --project windows/SticamHost.Tests/SticamHost.Tests.csproj --configuration Release --no-restore
