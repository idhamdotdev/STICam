name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android:
    name: Android APK
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build debug APK
        working-directory: android
        run: ./gradlew.bat assembleDebug --no-daemon

  windows-host:
    name: Windows Host
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build release
        working-directory: windows/SticamHost
        run: dotnet build -c Release

  dependency-submission:
    name: Dependency Submission
    # Without this the Android app is invisible to Dependabot alerts: GitHub
    # does not parse build.gradle (Gradle has no static dependency detection),
    # so a CVE in MediaPipe or androidx would never be reported. NuGet and
    # Actions are detected statically and need no equivalent job.
    # Push-only -- submitting from a PR would misreport main's dependencies.
    if: github.event_name == 'push'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Submit Android dependency graph
        uses: gradle/actions/dependency-submission@v6
        with:
          build-root-directory: android
